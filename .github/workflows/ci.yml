name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Vue lint, test, build and E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Verify committed embedded assets are current
        run: |
          git diff --exit-code -- ../server/internal/webui/dist
          test -z "$(git status --porcelain --untracked-files=all -- ../server/internal/webui/dist)"
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - name: Upload E2E evidence
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-${{ github.sha }}-${{ github.run_attempt }}
          path: web/playwright-report
          retention-days: 7

  go:
    name: Go test, race, vet, lint and vulnerability scan
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: 1.26.5
          cache-dependency-path: server/go.sum
      - run: go test -count=1 ./...
      - run: go test -race -count=1 ./...
      - run: go vet ./...
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.4.0 run ./...
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  companion-extension:
    name: Browser companion syntax and policy
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: companion-extension
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - name: Check JavaScript syntax
        run: |
          for file in *.js; do
            node --check "$file"
          done
      - name: Test URL and browser identity policies
        run: node --test extension.test.cjs

  postgres:
    name: PostgreSQL 18.4 integration
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_DB: apihub_test
          POSTGRES_USER: apihub
          POSTGRES_PASSWORD: integration-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apihub -d apihub_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APIHUB_INTEGRATION_DATABASE_URL: postgresql://apihub:integration-password@127.0.0.1:5432/apihub_test
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: 1.26.5
          cache-dependency-path: server/go.sum
      - run: go test -tags=integration -count=1 -v ./internal/service

  android-unit:
    name: Android unit, lint and release/R8
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: androidApp
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: 26
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        with:
          packages: platform-tools platforms;android-37.0 build-tools;36.0.0
      - uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3 # v4.4.2
      - run: ./gradlew testDebugUnitTest lintDebug assembleRelease --stacktrace
      - name: Upload release APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-release-unsigned-${{ github.sha }}-${{ github.run_attempt }}
          path: androidApp/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7

  android-instrumented:
    name: Android UI and Keystore (API ${{ matrix.api-level }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 35, 36]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: 26
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        with:
          packages: platform-tools platforms;android-37.0 build-tools;36.0.0
      - uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3 # v4.4.2
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run device tests
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed # v2.34.0
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          working-directory: androidApp
          script: ./gradlew connectedDebugAndroidTest --stacktrace

  container:
    name: Go container, PostgreSQL, hardening and smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    needs: [web, go, companion-extension, postgres, android-unit, android-instrumented]
    env:
      DATABASE_POOL_MAX: "7"
      DATABASE_IDLE_TIMEOUT_MS: "31000"
      DATABASE_CONNECTION_TIMEOUT_MS: "6000"
      DATABASE_STATEMENT_TIMEOUT_MS: "16000"
      HTTP_TIMEOUT_MS: "12000"
      MAX_RESPONSE_BYTES: "2097152"
      ALLOW_PRIVATE_SITES: "false"
      ALLOW_INSECURE_HTTP: "false"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Create ephemeral smoke credentials
        shell: bash
        run: |
          set -euo pipefail
          admin_token="$(openssl rand -hex 24)"
          app_secret="$(openssl rand -hex 32)"
          postgres_password="$(openssl rand -hex 24)"
          database_url="postgresql://apihub:${postgres_password}@postgres:5432/apihub"
          for value in "$admin_token" "$app_secret" "$postgres_password" "$database_url"; do
            echo "::add-mask::$value"
          done
          {
            echo "ADMIN_TOKEN=$admin_token"
            echo "APP_SECRET=$app_secret"
            echo "POSTGRES_PASSWORD=$postgres_password"
            echo "DATABASE_URL=$database_url"
          } >>"$GITHUB_ENV"
      - name: Run Go container smoke and pressure gates
        shell: bash
        run: |
          set -euo pipefail
          compose=(docker compose)
          auth_config="$(mktemp)"
          chmod 600 "$auth_config"
          printf 'header = "Authorization: Bearer %s"\n' "$ADMIN_TOKEN" >"$auth_config"
          trap 'rm -f -- "$auth_config"' EXIT

          wait_ready() {
            for attempt in $(seq 1 60); do
              if curl --fail --silent --connect-timeout 2 --max-time 5 http://127.0.0.1:4180/health/ready >/dev/null; then
                return 0
              fi
              if [ "$attempt" = 60 ]; then
                "${compose[@]}" logs --no-color
                return 1
              fi
              sleep 2
            done
          }

          "${compose[@]}" up -d --build
          wait_ready
          app_container="$("${compose[@]}" ps -q apihub)"
          test -n "$app_container"
          test "$(docker inspect --format '{{.Config.User}}' "$app_container")" = "nonroot:nonroot"
          test "$(docker inspect --format '{{.HostConfig.ReadonlyRootfs}}' "$app_container")" = "true"
          test "$(docker inspect --format '{{.HostConfig.Memory}}' "$app_container")" = "134217728"
          test "$(docker inspect --format '{{.HostConfig.PidsLimit}}' "$app_container")" = "128"
          test -n "$(docker inspect --format '{{index .HostConfig.Tmpfs "/tmp"}}' "$app_container")"
          test "$(docker inspect --format '{{json .HostConfig.CapDrop}}' "$app_container")" = '["ALL"]'
          docker inspect --format '{{json .HostConfig.SecurityOpt}}' "$app_container" | grep -q 'no-new-privileges'
          test "$(docker inspect --format '{{json .Config.Healthcheck.Test}}' "$app_container")" = '["CMD","/apihub","healthcheck"]'
          actual_env="$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$app_container")"
          for expected in \
            'DATABASE_POOL_MAX=7' \
            'DATABASE_IDLE_TIMEOUT_MS=31000' \
            'DATABASE_CONNECTION_TIMEOUT_MS=6000' \
            'DATABASE_STATEMENT_TIMEOUT_MS=16000' \
            'HTTP_TIMEOUT_MS=12000' \
            'MAX_RESPONSE_BYTES=2097152' \
            'ALLOW_PRIVATE_SITES=false' \
            'ALLOW_INSECURE_HTTP=false' \
            'GOMEMLIMIT=96MiB'; do
            grep -Fqx "$expected" <<<"$actual_env"
          done

          test "$(curl --silent --output /tmp/live.json --write-out '%{http_code}' http://127.0.0.1:4180/health/live)" = "200"
          test "$(curl --silent --output /tmp/ready.json --write-out '%{http_code}' http://127.0.0.1:4180/health/ready)" = "200"
          test "$(curl --silent --output /tmp/index.html --write-out '%{http_code}' http://127.0.0.1:4180/)" = "200"
          test "$(curl --silent --output /tmp/unauthorized.json --write-out '%{http_code}' http://127.0.0.1:4180/api/v1/sites)" = "401"
          test "$(curl --fail --silent --config "$auth_config" --output /tmp/sites.json --write-out '%{http_code}' http://127.0.0.1:4180/api/v1/sites)" = "200"
          test "$(curl --fail --silent --config "$auth_config" --output /tmp/summary.json --write-out '%{http_code}' http://127.0.0.1:4180/api/v1/summary)" = "200"
          jq -e '.status == "ok"' /tmp/live.json
          jq -e '.status == "ready"' /tmp/ready.json
          jq -e '.error.code == "AUTH_REQUIRED"' /tmp/unauthorized.json
          jq -e '.data | type == "array"' /tmp/sites.json
          jq -e 'has("sites") and has("today") and has("unreadAnnouncements")' /tmp/summary.json
          grep -qi '<!doctype html>' /tmp/index.html

          schema_state="$("${compose[@]}" exec -T postgres psql -U apihub -d apihub -Atqc "SELECT string_agg(version::text || ':' || checksum, ',' ORDER BY version) FROM schema_migrations")"
          test -n "$schema_state"
          test "$("${compose[@]}" exec -T postgres psql -U apihub -d apihub -Atqc 'SELECT count(*) FROM schema_migrations')" = "4"

          "${compose[@]}" up -d --force-recreate postgres
          for attempt in $(seq 1 30); do
            if "${compose[@]}" exec -T postgres pg_isready -U apihub -d apihub >/dev/null; then break; fi
            if [ "$attempt" = 30 ]; then "${compose[@]}" logs postgres; exit 1; fi
            sleep 2
          done
          test "$("${compose[@]}" exec -T postgres psql -U apihub -d apihub -Atqc "SELECT string_agg(version::text || ':' || checksum, ',' ORDER BY version) FROM schema_migrations")" = "$schema_state"
          wait_ready

          seq 1 60 | xargs -P16 -I{} curl --fail --silent --config "$auth_config" http://127.0.0.1:4180/api/v1/summary >/dev/null
          seq 1 60 | xargs -P16 -I{} curl --fail --silent http://127.0.0.1:4180/health/ready >/dev/null
          seq 1 60 | xargs -P16 -I{} curl --fail --silent http://127.0.0.1:4180/ >/dev/null
          test "$(docker inspect --format '{{.State.OOMKilled}}' "$app_container")" = "false"

          docker inspect "$app_container" >/tmp/apihub-container-inspect.json
          "${compose[@]}" stop -t 30 apihub
          test "$(docker inspect --format '{{.State.ExitCode}}' "$app_container")" = "0"
          test "$(docker inspect --format '{{.State.OOMKilled}}' "$app_container")" = "false"
          "${compose[@]}" logs --no-color apihub >/tmp/apihub-container.log
          grep -q 'shutting down' /tmp/apihub-container.log
          ! grep -q 'shutdown failed' /tmp/apihub-container.log
      - name: Upload container evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: go-container-${{ github.sha }}-${{ github.run_attempt }}
          path: |
            /tmp/apihub-container-inspect.json
            /tmp/apihub-container.log
            /tmp/live.json
            /tmp/ready.json
            /tmp/unauthorized.json
            /tmp/sites.json
            /tmp/summary.json
          if-no-files-found: warn
          retention-days: 14
      - name: Scan repository dependencies and secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          trivyignores: .trivyignore.yaml
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0
          timeout: 10m
          version: v0.70.0
          format: json
          output: /tmp/trivy-filesystem.json
      - name: Scan Go runtime image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: apihub-go:local
          scanners: vuln,secret
          trivyignores: .trivyignore.yaml
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0
          timeout: 10m
          skip-setup-trivy: true
          cache: false
          format: json
          output: /tmp/trivy-go-image.json
      - name: Scan PostgreSQL runtime image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
          scanners: vuln,secret
          trivyignores: .trivyignore.yaml
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0
          timeout: 10m
          skip-setup-trivy: true
          cache: false
          format: json
          output: /tmp/trivy-postgres-image.json
      - name: Enforce security scan gate
        shell: bash
        run: |
          set -euo pipefail
          for report in /tmp/trivy-filesystem.json /tmp/trivy-go-image.json /tmp/trivy-postgres-image.json; do
            test -s "$report"
            jq -e '([.Results[]?.Vulnerabilities[]?] + [.Results[]?.Secrets[]?]) | length == 0' "$report"
          done
      - name: Upload security scan evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trivy-security-${{ github.sha }}-${{ github.run_attempt }}
          path: /tmp/trivy-*.json
          if-no-files-found: warn
          retention-days: 14
      - name: Stop smoke environment
        if: always()
        shell: bash
        run: |
          export ADMIN_TOKEN="${ADMIN_TOKEN:-cleanup-admin-token-123456}"
          export APP_SECRET="${APP_SECRET:-cleanup-app-secret-with-at-least-32-characters}"
          export POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-cleanup-password}"
          export DATABASE_URL="${DATABASE_URL:-postgresql://apihub:cleanup-password@postgres:5432/apihub}"
          docker compose down -v --remove-orphans

  supply-chain:
    name: Immutable multi-architecture Go OCI evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [container]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - name: Build Go OCI
        id: go-oci
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: apihub-go:${{ github.sha }}
          outputs: type=oci,dest=/tmp/apihub-go-${{ github.sha }}.tar
          sbom: true
          provenance: mode=max
          build-args: |
            VERSION=ci-${{ github.run_number }}
            REVISION=${{ github.sha }}
      - name: Verify OCI indexes, attestations, digest and checksum
        shell: bash
        env:
          GO_DIGEST: ${{ steps.go-oci.outputs.digest }}
          GO_METADATA: ${{ steps.go-oci.outputs.metadata }}
        run: |
          set -euo pipefail
          oci_graph_has() {
            local layout="$1" descriptor_file="$2" filter="$3"
            local child_digest child
            if jq -e "$filter" "$descriptor_file" >/dev/null; then
              return 0
            fi
            while IFS= read -r child_digest; do
              [[ "$child_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
              child="$layout/blobs/sha256/${child_digest#sha256:}"
              if [ -f "$child" ] && oci_graph_has "$layout" "$child" "$filter"; then
                return 0
              fi
            done < <(jq -r '.manifests[]?.digest // empty' "$descriptor_file")
            return 1
          }
          archive="/tmp/apihub-go-${GITHUB_SHA}.tar"
          layout="/tmp/apihub-go-${GITHUB_SHA}.layout"
          test -n "$GO_DIGEST"
          printf '%s\n' "$GO_DIGEST" >"${archive%.tar}.digest"
          printf '%s\n' "$GO_METADATA" >"${archive%.tar}.metadata.json"
          (cd /tmp && sha256sum "$(basename "$archive")" >"$(basename "$archive").sha256")
          jq -e --arg digest "$GO_DIGEST" '."containerimage.digest" == $digest' "${archive%.tar}.metadata.json"
          mkdir -p "$layout"
          tar -xf "$archive" -C "$layout"
          oci_graph_has "$layout" "$layout/index.json" '[.manifests[]? | select(.platform.os == "linux" and (.platform.architecture == "amd64" or .platform.architecture == "arm64")) | .platform.architecture] | sort == ["amd64", "arm64"]'
          oci_graph_has "$layout" "$layout/index.json" 'any(.manifests[]?; .annotations["vnd.docker.reference.type"] == "attestation-manifest")'
          grep -R -a -q 'https://spdx.dev/Document' "$layout/blobs/sha256"
          grep -R -a -q 'https://slsa.dev/provenance/' "$layout/blobs/sha256"
      - name: Scan final Go OCI for amd64
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          scan-type: image
          input: /tmp/apihub-go-${{ github.sha }}.tar
          scanners: vuln,secret
          trivyignores: .trivyignore.yaml
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0
          timeout: 10m
          version: v0.70.0
          format: json
          output: /tmp/apihub-go-${{ github.sha }}.trivy.amd64.json
      - name: Scan final Go OCI for arm64
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          scan-type: image
          input: /tmp/apihub-go-${{ github.sha }}.tar
          scanners: vuln,secret
          trivyignores: .trivyignore.yaml
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0
          timeout: 10m
          skip-setup-trivy: true
          cache: false
          format: json
          output: /tmp/apihub-go-${{ github.sha }}.trivy.arm64.json
      - name: Enforce final OCI scan gate
        shell: bash
        run: |
          set -euo pipefail
          for report in /tmp/apihub-go-${GITHUB_SHA}.trivy.{amd64,arm64}.json; do
            test -s "$report"
            jq -e '([.Results[]?.Vulnerabilities[]?] + [.Results[]?.Secrets[]?]) | length == 0' "$report"
          done
      - name: Upload immutable Go OCI
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: apihub-go-oci-${{ github.sha }}-${{ github.run_attempt }}
          path: /tmp/apihub-go-${{ github.sha }}.*
          if-no-files-found: error
          retention-days: 30
