<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>APIHub</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">公益站 API 助手</p>
        <h1>APIHub</h1>
      </div>
      <div class="topbar-actions">
        <span id="connection-state" class="status-pill">未连接</span>
        <button id="logout-button" class="button button-secondary" type="button" hidden>退出</button>
      </div>
    </header>

    <main class="page-shell">
      <section id="login-panel" class="panel auth-panel">
        <div>
          <p class="eyebrow">管理员验证</p>
          <h2>连接你的自托管服务</h2>
          <p class="muted">管理员令牌仅保存在当前浏览器标签页的 sessionStorage 中。</p>
        </div>
        <form id="login-form" class="inline-form">
          <label class="field grow">
            <span>管理员令牌</span>
            <input id="admin-token" type="password" autocomplete="current-password" required minlength="16">
          </label>
          <button class="button button-primary" type="submit">进入控制台</button>
        </form>
        <p id="login-error" class="error-text" role="alert"></p>
      </section>

      <div id="app-panel" hidden>
        <section class="hero-grid" aria-label="系统概览">
          <article class="metric-card">
            <span>站点</span>
            <strong id="metric-sites">—</strong>
            <small id="metric-sites-detail">等待加载</small>
          </article>
          <article class="metric-card">
            <span>今日签到完成</span>
            <strong id="metric-checkins">—</strong>
            <small id="metric-checkins-detail">等待加载</small>
          </article>
          <article class="metric-card accent-card">
            <span>未读公告</span>
            <strong id="metric-announcements">—</strong>
            <small>来自所有已同步站点</small>
          </article>
        </section>

        <section class="section-block">
          <div class="section-heading">
            <div>
              <p class="eyebrow">站点</p>
              <h2>签到与公告源</h2>
            </div>
            <button id="show-site-form" class="button button-primary" type="button">添加站点</button>
          </div>

          <form id="site-form" class="panel form-grid" hidden>
            <label class="field"><span>站点名称</span><input name="name" required maxlength="80"></label>
            <label class="field wide"><span>站点地址</span><input name="baseUrl" type="url" placeholder="https://example.com" required></label>
            <label class="field"><span>站点类型</span><select name="adapter">
              <option value="auto">自动识别</option>
              <option value="new-api">New API</option>
              <option value="sub2api">Sub2API</option>
              <option value="zen-api">ZenAPI</option>
            </select></label>
            <label class="field"><span>用户 ID（New API 必填）</span><input name="userId" maxlength="128"></label>
            <label class="field wide"><span>访问令牌</span><input name="accessToken" type="password" required maxlength="4096"></label>
            <label class="field"><span>签到计划</span><input name="checkinCron" value="15 8 * * *" required></label>
            <label class="field"><span>公告计划</span><input name="announcementCron" value="*/30 * * * *" required></label>
            <label class="field"><span>时区</span><input name="timezone" value="Asia/Shanghai" required></label>
            <div class="form-actions wide">
              <button id="cancel-site-form" class="button button-secondary" type="button">取消</button>
              <button class="button button-primary" type="submit">保存站点</button>
            </div>
            <p id="site-form-error" class="error-text wide" role="alert"></p>
          </form>

          <div id="sites-list" class="site-grid"></div>
        </section>

        <section class="content-grid">
          <div class="section-block">
            <div class="section-heading compact">
              <div><p class="eyebrow">记录</p><h2>最近签到</h2></div>
              <button id="refresh-button" class="button button-secondary" type="button">刷新</button>
            </div>
            <div class="panel table-wrap">
              <table>
                <thead><tr><th>站点</th><th>日期</th><th>状态</th><th>奖励</th><th>说明</th></tr></thead>
                <tbody id="checkins-body"></tbody>
              </table>
            </div>
          </div>

          <div class="section-block">
            <div class="section-heading compact">
              <div><p class="eyebrow">信息流</p><h2>最新公告</h2></div>
            </div>
            <div id="announcements-list" class="announcement-list"></div>
          </div>
        </section>
      </div>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
