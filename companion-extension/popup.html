<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APIHub 浏览器伴侣</title><link rel="stylesheet" href="popup.css"></head><body><main><header><strong>APIHub 浏览器伴侣</strong><span id="state">未配对</span></header><form id="pair"><label>APIHub 地址<input id="apiBase" type="url" required placeholder="https://apihub.example.com"></label><label>设备名称<input id="deviceName" maxlength="80" required></label><label>一次性配对码<input id="code" maxlength="64" required autocomplete="one-time-code"></label><button type="submit">配对</button></form><section id="connected" hidden><p>已配对为 <strong id="pairedName"></strong></p><label class="switch"><input id="foregroundOnManual" type="checkbox">检测到登录或人机验证时前置窗口</label><button id="poll" type="button">立即检查任务</button><button id="disconnect" class="ghost" type="button">断开本机配对</button></section><p id="message" role="status"></p><footer>不会读取或上传 Cookie、LocalStorage、Authorization。</footer></main><script src="popup.js"></script></body></html>
