services:
  postgres:
    image: "${POSTGRES_IMAGE:-postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15}"
    restart: unless-stopped
    environment:
      POSTGRES_DB: apihub
      POSTGRES_USER: apihub
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - apihub-postgres-18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apihub -d apihub"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    stop_grace_period: 30s

  apihub:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: "${NODE_BUILD_IMAGE:-node:24-bookworm-slim@sha256:6f7b03f7c2c8e2e784dcf9295400527b9b1270fd37b7e9a7285cf83b6951452d}"
        GO_IMAGE: "${GO_BUILD_IMAGE:-golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651}"
        RUNTIME_IMAGE: "${RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot@sha256:aef9602f8710ec12bde19d593fed1f76c708531bb7aba205110f1029786ead7b}"
        NPM_REGISTRY: "${NPM_REGISTRY:-https://registry.npmjs.org}"
        GOPROXY: "${GOPROXY:-https://proxy.golang.org,direct}"
        GO_BUILD_GOMAXPROCS: "${GO_BUILD_GOMAXPROCS:-}"
        GO_BUILD_GOMEMLIMIT: "${GO_BUILD_GOMEMLIMIT:-}"
        GO_BUILD_FLAGS: "${GO_BUILD_FLAGS:-}"
    image: "${APIHUB_IMAGE:-apihub-go:local}"
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORT:-4180}:${PORT:-4180}"
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      HOST: "${HOST:-0.0.0.0}"
      PORT: "${PORT:-4180}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:?ADMIN_TOKEN is required}"
      APP_SECRET: "${APP_SECRET:?APP_SECRET is required}"
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"
      DATABASE_POOL_MAX: "${DATABASE_POOL_MAX:-5}"
      DATABASE_IDLE_TIMEOUT_MS: "${DATABASE_IDLE_TIMEOUT_MS:-30000}"
      DATABASE_CONNECTION_TIMEOUT_MS: "${DATABASE_CONNECTION_TIMEOUT_MS:-5000}"
      DATABASE_STATEMENT_TIMEOUT_MS: "${DATABASE_STATEMENT_TIMEOUT_MS:-15000}"
      HTTP_TIMEOUT_MS: "${HTTP_TIMEOUT_MS:-10000}"
      MAX_RESPONSE_BYTES: "${MAX_RESPONSE_BYTES:-1048576}"
      ALLOW_PRIVATE_SITES: "${ALLOW_PRIVATE_SITES:-false}"
      ALLOW_INSECURE_HTTP: "${ALLOW_INSECURE_HTTP:-false}"
      GOMEMLIMIT: "${GOMEMLIMIT:-96MiB}"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    mem_limit: 128m
    pids_limit: 128
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/apihub", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 30s

volumes:
  apihub-postgres-18-data:
